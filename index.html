  <!-- Web App Manifest (inline) -->
  <script>
    const manifest = {
      name: "RecoverWell",
      short_name: "RecoverWell",
      description: "Your personal physical therapy recovery companion.",
      start_url: ".",
      display: "standalone",
      background_color: "#F8F7F3",
      theme_color: "#1E2D27",
      orientation: "portrait",
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231E2D27'/%3E%3Ctext x='256' y='340' font-size='260' text-anchor='middle'%3E🌱%3C/text%3E%3C/svg%3E",
        sizes: "512x512",
        type: "image/svg+xml"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = url;
    document.head.appendChild(link);
  </script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const sw = `
          const CACHE = 'recoverwell-v1';
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
            self.skipWaiting();
          });
          self.addEventListener('activate', e => {
            e.waitUntil(clients.claim());
          });
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/')))
            );
          });
        `;
        const swBlob = new Blob([sw], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).catch(() => {});
      });
    }
  </script>

function useInterval(cb, delay) {
  const saved = useRef();
  useEffect(() => { saved.current = cb; }, [cb]);
  useEffect(() => {
    if (delay === null) return;
    const id = setInterval(() => saved.current(), delay);
    return () => clearInterval(id);
  }, [delay]);
}

function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const set = (v) => {
    const next = typeof v === 'function' ? v(val) : v;
    setVal(next);
    try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
  };
  return [val, set];
}


// ── Sound Engine ─────────────────────────────────────────────────────────────
const SoundEngine = (() => {
  let ctx = null;
  let muted = false;

  const unlock = () => {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (ctx.state === 'suspended') ctx.resume();
  };

  const play = (fn) => {
    if (muted) return;
    try { unlock(); fn(ctx); } catch(e) {}
  };

  const tone = (freq, duration, type='sine', vol=0.3, delay=0) => {
    play(ctx => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + duration + 0.05);
    });
  };

  const noise = (duration, vol=0.15) => {
    play(ctx => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const src = ctx.createBufferSource();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass'; filter.frequency.value = 1000;
      src.buffer = buf;
      src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      src.start(); src.stop(ctx.currentTime + duration + 0.05);
    });
  };

  return {
    setMuted: (v) => { muted = v; },
    isMuted: () => muted,
    unlock,

    // UI sounds
    click: () => {
      noise(0.04, 0.12);
      tone(800, 0.04, 'square', 0.06);
    },
    select: () => {
      tone(523, 0.06, 'sine', 0.15);
      tone(659, 0.08, 'sine', 0.12, 0.06);
    },
    confirm: () => {
      tone(523, 0.08, 'sine', 0.2);
      tone(659, 0.08, 'sine', 0.2, 0.09);
      tone(784, 0.15, 'sine', 0.2, 0.18);
    },
    tabSwitch: () => {
      tone(440, 0.06, 'sine', 0.1);
    },
    medTaken: () => {
      tone(659, 0.06, 'sine', 0.2);
      tone(880, 0.12, 'sine', 0.2, 0.07);
    },

    // Workout sounds
    beep: (vol=0.3) => {
      tone(880, 0.12, 'sine', vol);
    },
    countdownBeep: () => {
      tone(660, 0.15, 'sine', 0.35);
    },
    finalBeep: () => {
      tone(880, 0.08, 'sine', 0.4);
      tone(880, 0.08, 'sine', 0.4, 0.12);
      tone(1047, 0.25, 'sine', 0.5, 0.24);
    },
    restStart: () => {
      tone(523, 0.12, 'sine', 0.2);
      tone(392, 0.2, 'sine', 0.15, 0.13);
    },
    setComplete: () => {
      tone(523, 0.08, 'sine', 0.25);
      tone(659, 0.08, 'sine', 0.25, 0.09);
      tone(784, 0.08, 'sine', 0.25, 0.18);
      tone(1047, 0.2,  'sine', 0.3,  0.27);
    },
    sessionComplete: () => {
      const notes = [523,659,784,1047,1319,1047,1319,1568];
      const times = [0,0.1,0.2,0.3,0.45,0.6,0.7,0.8];
      notes.forEach((f,i) => tone(f, 0.18, 'sine', 0.3, times[i]));
    },
    exerciseNext: () => {
      tone(659, 0.08, 'sine', 0.2);
      tone(784, 0.12, 'sine', 0.2, 0.1);
    },
  };
})();

function WorkoutScreen({ exercises, onComplete, onBack, onPause, resumeData }) {
  if (!exercises || exercises.length === 0) {
    const el = React.createElement;
    return el('div',{style:{minHeight:'100vh',background:'#F8F7F3',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center'}},
      el('div',{style:{fontSize:60,marginBottom:16}},'😴'),
      el('h2',{style:{fontFamily:'Georgia,serif',color:'#1E2D27',marginBottom:12}},'No exercises today'),
      el('p',{style:{color:'#A8C0B5',marginBottom:32}},'Rest day or no exercises match your current phase.'),
      el('button',{onClick:onBack,style:{padding:'16px 32px',borderRadius:18,border:'none',background:'#3EC99A',color:'white',fontWeight:700,fontSize:16,cursor:'pointer'}},'Back to Home')
    );
  }
  const [idx, setIdx] = useState(resumeData ? resumeData.idx : 0);
  const [phase, setPhase] = useState(resumeData ? 'intro' : 'intro');
  const [timeLeft, setTimeLeft] = useState(0);
  const [totalTime, setTotalTime] = useState(0);
  const [repsLeft, setRepsLeft] = useState(resumeData ? resumeData.repsLeft : 0);
  const [setsDone, setSetsDone] = useState(resumeData ? resumeData.setsDone : 0);
  const [hasResumed] = useState(!!resumeData);
  const ex = exercises[idx];
  const el = React.createElement;

  useEffect(() => { if (phase === 'intro') { setRepsLeft(ex.reps); setSetsDone(0); } }, [idx]);

  useInterval(() => {
    if ((phase==='go'||phase==='rest') && timeLeft > 0) {
      setTimeLeft(t=>t-1);
      // Countdown beeps last 3 sec of REST only (not during reps)
      if (phase==='rest' && (timeLeft === 4 || timeLeft === 3 || timeLeft === 2)) SoundEngine.countdownBeep();
    }
    else if (phase==='go' && timeLeft===0) {
      // One rep done — check if more reps in this set
      if (repsLeft > 1) {
        // Tick to next rep, no rest between reps
        SoundEngine.beep(0.15);
        setRepsLeft(r=>r-1);
        setTimeLeft(ex.duration);
        setTotalTime(ex.duration);
      } else if (setsDone < ex.sets-1) {
        // Set complete — enter rest
        SoundEngine.setComplete();
        setSetsDone(s=>s+1);
        setRepsLeft(ex.reps);
        setPhase('rest');
        setTimeLeft(ex.rest);
        setTotalTime(ex.rest);
      } else {
        // All sets done
        SoundEngine.setComplete();
        setPhase('done');
      }
    } else if (phase==='rest' && timeLeft===0) {
      // Rest over — start next set
      SoundEngine.beep();
      setPhase('go');
      setTimeLeft(ex.duration);
      setTotalTime(ex.duration);
    }
  }, (phase==='go'||phase==='rest') ? 1000 : null);

  const pct = totalTime > 0 ? ((totalTime-timeLeft)/totalTime)*100 : 0;
  const progress = (idx+(phase==='done'?1:0))/exercises.length*100;
  const allDone = phase==='done' && idx >= exercises.length-1;

  if (allDone) return el('div', { className:'screen fade-in', style: { background:'linear-gradient(160deg,#1E2D27,#2A4038)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center' } },
    el('div', { style: { fontSize:80, marginBottom:16 } }, '🎉'),
    el('h1', { style: { fontFamily:'Georgia,serif', color:'white', fontSize:36, marginBottom:12 } }, 'Session Complete!'),
    el('p', { style: { color:'#A8C0B5', fontSize:16, marginBottom:8 } }, 'You finished all ' + exercises.length + ' exercises.'),
    el('p', { style: { color:'#3EC99A', fontSize:15, fontStyle:'italic', marginBottom:40 } }, 'The comeback is always stronger. 💚'),
    el('button', { onClick:onComplete, style: { padding:'18px 48px', borderRadius:20, border:'none', background:'#3EC99A', color:'white', fontWeight:800, fontSize:18, cursor:'pointer' } }, 'Finish and Save 🌿')
  );

  return el('div', { className:'screen', style: { display:'flex', flexDirection:'column' } },
    el('div', { style: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'calc(var(--safe-top)+12px) 24px 12px' } },
      el('button', { onClick:()=>{
        if (phase==='done') { onBack(); return; }
        if (phase==='intro') {
          // intro phase — show option to save or exit
          if (idx > 0 || setsDone > 0) {
            const choice = window.confirm('Save your progress so you can resume later? Tap OK to save, Cancel to discard.');
            if (choice && onPause) { SoundEngine.click(); onPause({ idx, setsDone, repsLeft }); return; }
          }
          onBack(); return;
        }
        // mid-exercise — offer to save
        const save = window.confirm('Save your progress and exit? You can resume from here later. Tap OK to save, Cancel to keep working out.');
        if (save && onPause) { SoundEngine.click(); onPause({ idx, setsDone:setsDone, repsLeft:ex.reps }); }
      }, style: { background:'none', border:'none', fontSize:26, cursor:'pointer', color:'#4A6358' } }, '‹'),
      el('span', { style: { color:'#A8C0B5', fontWeight:600, fontSize:14 } }, (idx+1)+' / '+exercises.length),
      el('button', { onClick:()=>window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(ex.name+' physical therapy exercise demonstration'),'_blank'), style: { background:'#E6F9F2', border:'none', borderRadius:12, padding:'8px 14px', color:'#27A87C', fontSize:12, fontWeight:700, cursor:'pointer' } }, 'Demo')
    ),
    el('div', { style: { height:6, background:'#E0EDE8', margin:'0 24px', borderRadius:3 } },
      el('div', { style: { height:'100%', background:'#3EC99A', width:progress+'%', borderRadius:3, transition:'width 0.4s' } })
    ),
    el('div', { style: { flex:1, display:'flex', flexDirection:'column', alignItems:'center', padding:24, gap:18 } },
      el('div', { style: { textAlign:'center' } },
        el('div', { style: { fontSize:58, marginBottom:8 } }, ex.icon),
        hasResumed && idx === (resumeData ? resumeData.idx : 0) && phase === 'intro' && el('div', { style:{ background:'#E6F9F2', border:'1.5px solid #3EC99A', borderRadius:14, padding:'8px 14px', marginBottom:8, color:'#27A87C', fontSize:13, fontWeight:600, display:'inline-flex', alignItems:'center', gap:6 } }, '⏯️ Resumed — Set ' + ((resumeData?resumeData.setsDone:0)+1) + ' of ' + ex.sets),
        el('h2', { style: { fontFamily:'Georgia,serif', color:'#1E2D27', fontSize:26, margin:'0 0 8px' } }, ex.name),
        el('div', { style: { display:'flex', gap:8, justifyContent:'center' } },
          el(Chip, { label:ex.diff, color:diffColor(ex.diff) }),
          el(Chip, { label:'Set '+(setsDone+1)+'/'+ex.sets, color:'#9B8EC4' })
        )
      ),
      phase!=='intro' && phase!=='done' && el(Ring, { pct, size:154, stroke:12, color:phase==='rest'?'#FF7B54':'#3EC99A', label:timeLeft, sublabel:phase==='rest'?'REST':'secs' }),
      phase!=='intro' && el('div', { className:'card', style: { display:'flex', gap:24, justifyContent:'center', padding:'14px 32px' } },
        el('div', { style: { textAlign:'center' } },
          el('div', { style: { fontSize:26, fontWeight:800, color:'#1E2D27' } }, (ex.reps - repsLeft + 1) + '/' + ex.reps),
          el('div', { style: { fontSize:12, color:'#A8C0B5' } }, 'Rep')
        ),
        el('div', { style: { width:1, background:'#E0EDE8' } }),
        el('div', { style: { textAlign:'center' } },
          el('div', { style: { fontSize:26, fontWeight:800, color:'#1E2D27' } }, (setsDone+1) + '/' + ex.sets),
          el('div', { style: { fontSize:12, color:'#A8C0B5' } }, 'Set')
        )
      ),
      el('div', { className:'card', style: { width:'100%' } },
        phase==='rest' && el('p', { style: { margin:'0 0 8px', color:'#FF7B54', fontWeight:700 } }, 'Rest — breathe deeply'),
        phase==='go' && el('p', { style: { margin:'0 0 8px', color:'#27A87C', fontWeight:700 } }, 'Go — stay focused'),
        phase==='done' && el('p', { style: { margin:'0 0 8px', color:'#27A87C', fontWeight:700 } }, 'Exercise complete!'),
        phase==='intro' && el('p', { style: { margin:'0 0 8px', fontWeight:700, color:'#1E2D27' } }, 'How to do it:'),
        phase==='intro' && el('p', { style: { margin:'0 0 10px', color:'#4A6358', fontSize:14, lineHeight:1.6 } }, ex.steps[0]),
        el('p', { style: { margin:0, color:'#A8C0B5', fontSize:12 } }, '⚠️ ' + ex.caution)
      )
    ),
    el('div', { style: { padding:'12px 24px calc(var(--safe-bottom)+20px)', display:'flex', gap:12 } },
      phase==='intro' && el('button', { onClick:()=>{ setPhase('go'); setTimeLeft(ex.duration); setTotalTime(ex.duration); },
        style: { flex:1, padding:18, borderRadius:18, border:'none', background:'linear-gradient(135deg,#3EC99A,#27A87C)', color:'white', fontWeight:800, fontSize:17, cursor:'pointer' } }, 'Start Exercise'),
      (phase==='go'||phase==='rest') && el('button', { onClick:()=>{
        SoundEngine.click();
        if (idx < exercises.length-1) { setIdx(i=>i+1); setPhase('intro'); }
        else { setPhase('done'); }
      }, style: { flex:1, padding:18, borderRadius:18, border:'2px solid #FF7B54', background:'transparent', color:'#FF7B54', fontWeight:700, fontSize:14, cursor:'pointer' } }, 'Skip'),
      (phase==='go'||phase==='rest') && el('button', { onClick:()=>{SoundEngine.click(); setPhase('intro');}, style: { flex:1, padding:18, borderRadius:18, border:'2px solid #3EC99A', background:'transparent', color:'#3EC99A', fontWeight:700, fontSize:14, cursor:'pointer' } }, 'Restart'),
      (phase==='go'||phase==='rest') && el('button', { onClick:()=>{SoundEngine.setComplete();setPhase('done');}, style: { flex:2, padding:18, borderRadius:18, border:'none', background:'#3EC99A', color:'white', fontWeight:700, fontSize:16, cursor:'pointer' } }, 'Mark Done ✓'),
      phase==='done' && el('button', { onClick:()=>{ setIdx(i=>i+1); setPhase('intro'); },
        style: { flex:1, padding:18, borderRadius:18, border:'none', background:'linear-gradient(135deg,#3EC99A,#27A87C)', color:'white', fontWeight:800, fontSize:17, cursor:'pointer' } }, 'Next Exercise')
    )
  );
}

function ProgressScreen({ plan, history }) {

  const surgLabel = (SURGERY_TYPES.find(s=>s.id===plan.surgery)||{}).label || plan.surgery;

  const copyReport = () => {

      'Surgery: ' + surgLabel,

      'Total reps: ' + totalReps,

    lines.push('---', 'PT NOTES', ptNotes || '(No notes)', '---', 'Generated by RecoverWell.');
    try { navigator.clipboard.writeText(lines.join('\n')); } catch {}
    alert('Report copied! Share it with your PT.');
  };

  return el('div', { className:'screen pb-nav fade-in' },
    el('div', { className:'hero' },
      el('h1', null, 'Your Progress'),
      el('p', null, 'Keep building that momentum 🔥')

    el('div', { style: { padding:'24px 24px 0' } },
      el('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:22 } },
        ...[

// ── Coach ─────────────────────────────────────────────────────────────────────
function CoachScreen({ user }) {
  const [messages, setMessages] = useState([
    { role:'assistant', text:'Hi ' + user.name + '! I am your recovery coach. Type a question below.' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();
  const el = React.createElement;

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior:'smooth' });
  }, [messages]);

  const send = async () => {
    const msg = input.trim();
    if (!msg || loading) return;
    setInput('');
    setMessages(m => [...m, { role:'user', text:msg }]);
    setLoading(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system:'You are a PT recovery coach. Patient: ' + user.name + '. Procedure: ' + (user.subcat||user.surgery) + '. Phase: ' + user.phase + '/3. Pain: ' + user.painLevel + '/10. Give practical advice in 2-4 sentences. Always recommend consulting their PT for medical decisions.',
          messages: messages.slice(1).map(m=>({role:m.role,content:m.text})).concat([{role:'user',content:msg}])
        })
      });
      const data = await res.json();
      const reply = data.content&&data.content[0] ? data.content[0].text : 'Please try again.';
      setMessages(m => [...m, { role:'assistant', text:reply }]);
    } catch(e) {
      setMessages(m => [...m, { role:'assistant', text:'Connection issue. Please try again.' }]);
    }
    setLoading(false);
  };

  return el('div', {
    style:{ position:'fixed', inset:0, zIndex:50, background:'#F8F7F3', display:'flex', flexDirection:'column' }
  },
    // Header
    el('div', { style:{ background:'linear-gradient(145deg,#1E2D27,#2A4038)', padding:'calc(var(--safe-top) + 12px) 24px 20px', flexShrink:0 } },
      el('div', { style:{ display:'flex', alignItems:'center', gap:14 } },
        el('div', { style:{ width:48, height:48, borderRadius:'50%', background:'#3EC99A', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22 } }, '🌿'),
        el('div', null,
          el('h2', { style:{ color:'white', margin:0, fontSize:20, fontFamily:'Georgia,serif' } }, 'Recovery Coach'),
          el('p', { style:{ color:'#A8C0B5', margin:0, fontSize:13 } }, 'AI-powered · Always here for you')
        )
      )
    ),

    // Messages
    el('div', { style:{ flex:1, overflowY:'auto', padding:'16px', display:'flex', flexDirection:'column', gap:12 } },
      ...messages.map((m,i) =>
        el('div', { key:i, style:{ display:'flex', justifyContent:m.role==='user'?'flex-end':'flex-start' } },
          el('div', { style:{
            maxWidth:'82%', padding:'12px 16px', borderRadius:18,
            borderBottomRightRadius:m.role==='user'?4:18,
            borderBottomLeftRadius:m.role==='assistant'?4:18,
            background:m.role==='user'?'#3EC99A':'white',
            color:m.role==='user'?'white':'#1E2D27',
            fontSize:15, lineHeight:1.6,
            boxShadow:'0 2px 8px rgba(30,45,39,0.08)'
          } }, m.text)
        )
      ),
      loading && el('div', { style:{ display:'flex' } },
        el('div', { style:{ background:'white', padding:'12px 16px', borderRadius:18, borderBottomLeftRadius:4 } },
          el('span', { style:{ color:'#A8C0B5' } }, 'Thinking...')
        )
      ),
      el('div', { ref:bottomRef })
    ),

    // Input — pinned to bottom, above tab bar
    el('div', { style:{
      flexShrink:0, display:'flex', gap:10, padding:'12px 16px',
      paddingBottom:'calc(80px + var(--safe-bottom))',
      background:'white', borderTop:'2px solid #E8F0EB'
    } },
      el('input', {
        value:input,
        onChange:e=>setInput(e.target.value),
        onKeyDown:e=>{ if(e.key==='Enter'){ e.preventDefault(); send(); } },
        placeholder:'Type your question...',
        style:{
          flex:1, padding:'13px 18px', borderRadius:24,
          border:'2px solid #3EC99A', fontSize:15,
          outline:'none', background:'#F8F7F3', color:'#1E2D27'
        }
      }),
      el('button', {
        onClick:send,
        disabled:loading||!input.trim(),
        style:{
          width:50, height:50, borderRadius:'50%', border:'none', flexShrink:0,
          background:input.trim()?'#3EC99A':'#C8DFD6',
          color:'white', fontSize:22,
          cursor:input.trim()?'pointer':'default'
        }
      }, '↑')
    )
  );
}

  const colors = ['#3EC99A','#FF7B54','#F5A623','#9B8EC4'];
  const el = React.createElement;

  const toggle = (medId, time) => setMeds(prev => prev.map(m => {

              background:taken?med.color:'white', color:taken?'white':med.color, fontWeight:700, fontSize:13, cursor:'pointer' } },

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  // Multi-plan storage — array of independent plans
  const [plans, setPlans] = useStorage('rw-plans-v1', []);
  const [activePlanId, setActivePlanId] = useStorage('rw-active-plan', null);
  const [screen, setScreen] = useState(plans.length > 0 ? 'main' : 'onboarding');
  const [tab, setTab] = useState('home');
  const [workoutEx, setWorkoutEx] = useState([]);
  const [workoutPlanId, setWorkoutPlanId] = useState(null);
  const [history, setHistory] = useStorage('rw-history', []);
  const [pausedSession, setPausedSession] = useStorage('rw-paused-session', null);
  const [addingPlan, setAddingPlan] = useState(false);
  const el = React.createElement;

  const activePlan = plans.find(p => p.id === activePlanId) || plans[0] || null;

  const onOnboardComplete = (data) => {
    const newPlan = {
      ...data,
      id: Date.now().toString(),
      streak: 0,
      createdAt: new Date().toISOString(),
      status: 'active',
    };
    const newPlans = [...plans, newPlan];
    setPlans(newPlans);
    setActivePlanId(newPlan.id);
    setAddingPlan(false);
    setScreen('main');
    setTab('home');
  };

  const onStartWorkout = (exs, planId) => {
    setWorkoutEx(exs);
    setWorkoutPlanId(planId);
    setScreen('workout');
  };

  const onWorkoutDone = () => {
    const totalReps = workoutEx.reduce((a,e) => a+e.reps*e.sets, 0);
    setHistory(h => [...h, { date:new Date().toISOString(), exercises:workoutEx.length, totalReps, pain:activePlan.painLevel, planId:workoutPlanId }]);
    setPlans(ps => ps.map(p => p.id===workoutPlanId ? {...p, streak:(p.streak||0)+1} : p));
    setPausedSession(null);
    setScreen('main');
    setTab('home');
  };

  const onPauseWorkout = (state) => {
    setPausedSession({ ...state, planId:workoutPlanId, exerciseIds:workoutEx.map(e=>e.id), savedAt:new Date().toISOString() });
    setScreen('main');
    setTab('home');
  };

  const onResumeWorkout = () => {
    if (!pausedSession) return;
    const plan = plans.find(p => p.id === pausedSession.planId);
    if (!plan) { setPausedSession(null); return; }
    // Rebuild exercises list from current available exercises matching saved IDs
    const planEquip = plan.equipment || [];
    const hasEq = (n) => !n || n.length===0 || (planEquip.length > 0 && !planEquip.includes('none') && n.some(eq=>planEquip.includes(eq)));
    const equipKeys = {
      knee:['band_knee','kneeBar_exercises','dumbbell_knee','weights_knee','yogaBall_knee'],
      hip:['band_hip','dumbbell_hip','yogaBall_hip'],
      shoulder:['band_shoulder','dumbbell_shoulder','yogaBall_shoulder'],
      ankle:['band_ankle','yogaBall_ankle'],
      elbow:['band_elbow'],
      back:['band_back','dumbbell_back','yogaBall_back'],
      calf:['band_calf','dumbbell_calf','yogaBall_calf'],
    };
    const baseEx = EXERCISES[plan.subcat] || EXERCISES[plan.surgery] || [];
    const extraEx = (equipKeys[plan.surgery]||[]).flatMap(k => EXERCISES[k]||[]);
    const customEx = plan.customExercises || [];
    const allEx = [...baseEx, ...extraEx, ...customEx];
    const exs = pausedSession.exerciseIds.map(id => allEx.find(e=>e.id===id)).filter(Boolean);
    if (exs.length === 0) { setPausedSession(null); return; }
    setWorkoutEx(exs);
    setWorkoutPlanId(pausedSession.planId);
    setActivePlanId(pausedSession.planId);
    setScreen('workout');
  };

  const onAddCustomExercise = (ex) => {
    setPlans(ps => ps.map(p => p.id===activePlanId ? {...p, customExercises:[...(p.customExercises||[]), ex]} : p));
  };
  const onUpdateCustomExercise = (ex) => {
    setPlans(ps => ps.map(p => p.id===activePlanId ? {...p, customExercises:(p.customExercises||[]).map(e=>e.id===ex.id?ex:e)} : p));
  };
  const onDeleteCustomExercise = (id) => {
    setPlans(ps => ps.map(p => p.id===activePlanId ? {...p, customExercises:(p.customExercises||[]).filter(e=>e.id!==id)} : p));
  };
  const onArchivePlan = (planId) => {
    setPlans(ps => ps.map(p => p.id===planId ? {...p, status:'archived'} : p));
    if (activePlanId === planId) {
      const next = plans.find(p => p.id !== planId && p.status === 'active');
      setActivePlanId(next ? next.id : null);
    }
  };

  const onRestorePlan = (planId) => {
    setPlans(ps => ps.map(p => p.id===planId ? {...p, status:'active'} : p));
  };

  // Show onboarding when adding new plan or no plans exist
  if (screen === 'onboarding' || addingPlan) {
    return el(Onboarding, { onComplete: onOnboardComplete, isAdding: addingPlan, onCancel: addingPlan ? ()=>{ setAddingPlan(false); setScreen('main'); } : null });
  }
  if (screen === 'workout') {
    const resumeData = (pausedSession && pausedSession.planId === workoutPlanId) ? pausedSession : null;
    return el(WorkoutScreen, { exercises:workoutEx, onComplete:onWorkoutDone, onBack:()=>setScreen('main'), onPause:onPauseWorkout, resumeData });
  }

  const tabs = [
    { id:'home',     icon:'🏠', label:'Home' },
    { id:'plans',    icon:'📋', label:'Plans' },
    { id:'coach',    icon:'🌿', label:'Coach' },
    { id:'progress', icon:'📈', label:'Progress' },
    { id:'meds',     icon:'💊', label:'Meds' },
  ];

  return el('div', null,
    tab==='home'     && el(HomeScreen,     { plan:activePlan, allPlans:plans.filter(p=>p.status==='active'), onStartWorkout, onSwitchPlan:id=>setActivePlanId(id), onAddCustom:onAddCustomExercise, onUpdateCustom:onUpdateCustomExercise, onDeleteCustom:onDeleteCustomExercise, pausedSession:(pausedSession && pausedSession.planId===activePlanId)?pausedSession:null, onResumeSession:onResumeWorkout, onDiscardSession:()=>setPausedSession(null) }),
    tab==='plans'    && el(PlansScreen,    { plans, activePlanId, onSwitch:id=>{ setActivePlanId(id); setTab('home'); }, onAdd:()=>setAddingPlan(true), onArchive:onArchivePlan, onRestore:onRestorePlan }),
    tab==='progress' && el(ProgressScreen, { plan:activePlan, history:history.filter(h=>h.planId===activePlanId||!h.planId) }),
    tab==='meds'     && el(MedsScreen),
    el('div', { className:'tab-bar' },
      ...tabs.map(t => el('button', { key:t.id, className:'tab-btn '+(tab===t.id?'active':''), onClick:()=>{SoundEngine.tabSwitch();setTab(t.id);} },
        el('span', null, t.icon),
        el('span', null, t.label)
      ))
    ),
    tab==='coach' && el('div', { style:{ position:'fixed', inset:0, zIndex:50, background:'#F8F7F3' } },
      el(CoachScreen, { user:activePlan }),
      el('button', { onClick:()=>setTab('home'), style:{ position:'absolute', top:'calc(var(--safe-top) + 16px)', right:16, background:'rgba(255,255,255,0.2)', border:'none', color:'white', borderRadius:'50%', width:36, height:36, fontSize:18, cursor:'pointer', zIndex:51 } }, '✕')
    ),
    el(InstallBanner)
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
</body>
</html>
