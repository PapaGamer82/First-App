  <!-- Web App Manifest (inline) -->
  <script>
    const manifest = {
      name: "RecoverWell",
      short_name: "RecoverWell",
      description: "Your personal physical therapy recovery companion.",
      start_url: ".",
      display: "standalone",
      background_color: "#F8F7F3",

      orientation: "portrait",

        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231E2D27'/%3E%3Ctext x='256' y='340' font-size='260' text-anchor='middle'%3E🌱%3C/text%3E%3C/svg%3E",
        sizes: "512x512",
        type: "image/svg+xml"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = url;
    document.head.appendChild(link);
  </script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const sw = `
          const CACHE = 'recoverwell-v1';
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
            self.skipWaiting();
          });
          self.addEventListener('activate', e => {
            e.waitUntil(clients.claim());
          });
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/')))
            );
          });
        `;
        const swBlob = new Blob([sw], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).catch(() => {});
      });
    }
  </script>

function useInterval(cb, delay) {
  const saved = useRef();
  useEffect(() => { saved.current = cb; }, [cb]);
  useEffect(() => {
    if (delay === null) return;
    const id = setInterval(() => saved.current(), delay);
    return () => clearInterval(id);
  }, [delay]);
}

function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const set = (v) => {
    const next = typeof v === 'function' ? v(val) : v;
    setVal(next);
    try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
  };
  return [val, set];
}

function Ring({ pct, size, stroke, color, label, sublabel }) {

    React.createElement('svg', { width: size, height: size, style: { position: 'absolute', transform: 'rotate(-90deg)' } },

      React.createElement('circle', { cx: size/2, cy: size/2, r, fill: 'none', stroke: color, strokeWidth: stroke,

  useInterval(() => {
    if ((phase==='go'||phase==='rest') && timeLeft > 0) { setTimeLeft(t=>t-1); }
    else if (phase==='go' && timeLeft===0) {
      if (repsLeft > 1) { setRepsLeft(r=>r-1); setPhase('rest'); setTimeLeft(ex.rest); setTotalTime(ex.rest); }
      else if (setsDone < ex.sets-1) { setSetsDone(s=>s+1); setRepsLeft(ex.reps); setPhase('rest'); setTimeLeft(ex.rest); setTotalTime(ex.rest); }
      else { setPhase('done'); }
    } else if (phase==='rest' && timeLeft===0) { setPhase('go'); setTimeLeft(ex.duration); setTotalTime(ex.duration); }
  }, (phase==='go'||phase==='rest') ? 1000 : null);

  const pct = totalTime > 0 ? ((totalTime-timeLeft)/totalTime)*100 : 0;
  const progress = (idx+(phase==='done'?1:0))/exercises.length*100;
  const allDone = phase==='done' && idx >= exercises.length-1;

  if (allDone) return el('div', { className:'screen fade-in', style: { background:'linear-gradient(160deg,#1E2D27,#2A4038)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center' } },

  );

  return el('div', { className:'screen', style: { display:'flex', flexDirection:'column' } },
    el('div', { style: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'calc(var(--safe-top)+12px) 24px 12px' } },
      el('button', { onClick:onBack, style: { background:'none', border:'none', fontSize:26, cursor:'pointer', color:'#4A6358' } }, '‹'),
      el('span', { style: { color:'#A8C0B5', fontWeight:600, fontSize:14 } }, (idx+1)+' / '+exercises.length),
      el('button', { onClick:()=>window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(ex.name+' physical therapy exercise demonstration'),'_blank'), style: { background:'#E6F9F2', border:'none', borderRadius:12, padding:'8px 14px', color:'#27A87C', fontSize:12, fontWeight:700, cursor:'pointer' } }, 'Demo')
    ),
    el('div', { style: { height:6, background:'#E0EDE8', margin:'0 24px', borderRadius:3 } },
      el('div', { style: { height:'100%', background:'#3EC99A', width:progress+'%', borderRadius:3, transition:'width 0.4s' } })
    ),
    el('div', { style: { flex:1, display:'flex', flexDirection:'column', alignItems:'center', padding:24, gap:18 } },
      el('div', { style: { textAlign:'center' } },
        el('div', { style: { fontSize:58, marginBottom:8 } }, ex.icon),
        el('h2', { style: { fontFamily:'Georgia,serif', color:'#1E2D27', fontSize:26, margin:'0 0 8px' } }, ex.name),
        el('div', { style: { display:'flex', gap:8, justifyContent:'center' } },
          el(Chip, { label:ex.diff, color:diffColor(ex.diff) }),
          el(Chip, { label:'Set '+(setsDone+1)+'/'+ex.sets, color:'#9B8EC4' })
        )
      ),
      phase!=='intro' && phase!=='done' && el(Ring, { pct, size:154, stroke:12, color:phase==='rest'?'#FF7B54':'#3EC99A', label:timeLeft, sublabel:phase==='rest'?'REST':'secs' }),
      phase!=='intro' && el('div', { className:'card', style: { display:'flex', gap:24, justifyContent:'center', padding:'14px 32px' } },
        el('div', { style: { textAlign:'center' } },
          el('div', { style: { fontSize:26, fontWeight:800, color:'#1E2D27' } }, repsLeft),

// ── Coach ─────────────────────────────────────────────────────────────────────
function CoachScreen({ user }) {
  const [messages, setMessages] = useState([
    { role:'assistant', text:'Hi ' + user.name + '! I am your recovery coach. Type a question below.' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();
  const el = React.createElement;

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior:'smooth' });
  }, [messages]);

  const send = async () => {
    const msg = input.trim();
    if (!msg || loading) return;
    setInput('');
    setMessages(m => [...m, { role:'user', text:msg }]);
    setLoading(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system:'You are a PT recovery coach. Patient: ' + user.name + '. Procedure: ' + (user.subcat||user.surgery) + '. Phase: ' + user.phase + '/3. Pain: ' + user.painLevel + '/10. Give practical advice in 2-4 sentences. Always recommend consulting their PT for medical decisions.',
          messages: messages.slice(1).map(m=>({role:m.role,content:m.text})).concat([{role:'user',content:msg}])
        })
      });
      const data = await res.json();
      const reply = data.content&&data.content[0] ? data.content[0].text : 'Please try again.';
      setMessages(m => [...m, { role:'assistant', text:reply }]);
    } catch(e) {
      setMessages(m => [...m, { role:'assistant', text:'Connection issue. Please try again.' }]);
    }
    setLoading(false);
  };

  return el('div', {
    style:{ position:'fixed', inset:0, zIndex:50, background:'#F8F7F3', display:'flex', flexDirection:'column' }
  },
    // Header
    el('div', { style:{ background:'linear-gradient(145deg,#1E2D27,#2A4038)', padding:'calc(var(--safe-top) + 12px) 24px 20px', flexShrink:0 } },
      el('div', { style:{ display:'flex', alignItems:'center', gap:14 } },
        el('div', { style:{ width:48, height:48, borderRadius:'50%', background:'#3EC99A', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22 } }, '🌿'),
        el('div', null,
          el('h2', { style:{ color:'white', margin:0, fontSize:20, fontFamily:'Georgia,serif' } }, 'Recovery Coach'),
          el('p', { style:{ color:'#A8C0B5', margin:0, fontSize:13 } }, 'AI-powered · Always here for you')
        )
      )
    ),

    // Messages
    el('div', { style:{ flex:1, overflowY:'auto', padding:'16px', display:'flex', flexDirection:'column', gap:12 } },
      ...messages.map((m,i) =>
        el('div', { key:i, style:{ display:'flex', justifyContent:m.role==='user'?'flex-end':'flex-start' } },
          el('div', { style:{
            maxWidth:'82%', padding:'12px 16px', borderRadius:18,
            borderBottomRightRadius:m.role==='user'?4:18,
            borderBottomLeftRadius:m.role==='assistant'?4:18,
            background:m.role==='user'?'#3EC99A':'white',
            color:m.role==='user'?'white':'#1E2D27',
            fontSize:15, lineHeight:1.6,
            boxShadow:'0 2px 8px rgba(30,45,39,0.08)'
          } }, m.text)
        )
      ),
      loading && el('div', { style:{ display:'flex' } },
        el('div', { style:{ background:'white', padding:'12px 16px', borderRadius:18, borderBottomLeftRadius:4 } },
          el('span', { style:{ color:'#A8C0B5' } }, 'Thinking...')
        )
      ),
      el('div', { ref:bottomRef })
    ),

    // Input — pinned to bottom, above tab bar
    el('div', { style:{
      flexShrink:0, display:'flex', gap:10, padding:'12px 16px',
      paddingBottom:'calc(80px + var(--safe-bottom))',
      background:'white', borderTop:'2px solid #E8F0EB'
    } },
      el('input', {
        value:input,
        onChange:e=>setInput(e.target.value),
        onKeyDown:e=>{ if(e.key==='Enter'){ e.preventDefault(); send(); } },
        placeholder:'Type your question...',
        style:{
          flex:1, padding:'13px 18px', borderRadius:24,
          border:'2px solid #3EC99A', fontSize:15,
          outline:'none', background:'#F8F7F3', color:'#1E2D27'
        }
      }),
      el('button', {
        onClick:send,
        disabled:loading||!input.trim(),
        style:{
          width:50, height:50, borderRadius:'50%', border:'none', flexShrink:0,
          background:input.trim()?'#3EC99A':'#C8DFD6',
          color:'white', fontSize:22,
          cursor:input.trim()?'pointer':'default'
        }
      }, '↑')
    )
  );
}

function MedsScreen() {
  const [meds, setMeds] = useStorage('rw-meds', [
    { id:1, name:'Anti-inflammatory', dose:'200mg', times:['8:00 AM','8:00 PM'], taken:{}, color:'#3EC99A' },
    { id:2, name:'Pain Medication', dose:'As needed', times:['As needed'], taken:{}, color:'#FF7B54' },
  ]);
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState('');
  const [newDose, setNewDose] = useState('');
  const [newTime, setNewTime] = useState('08:00');
  const today = new Date().toDateString();
  const colors = ['#3EC99A','#FF7B54','#F5A623','#9B8EC4'];
  const el = React.createElement;

  const toggle = (medId, time) => setMeds(prev => prev.map(m => {
    if (m.id !== medId) return m;
    const key = today + '-' + time;
    return { ...m, taken: { ...m.taken, [key]: !m.taken[key] } };
  }));

  const addMed = () => {
    if (!newName.trim()) return;
    setMeds(prev => [...prev, { id:Date.now(), name:newName, dose:newDose, times:[newTime], taken:{}, color:colors[prev.length%4] }]);
    setNewName(''); setNewDose(''); setNewTime('08:00'); setShowAdd(false);
  };

  const takenToday = meds.flatMap(m => m.times.filter(t => m.taken[today+'-'+t])).length;
  const totalDoses = meds.flatMap(m => m.times).length;

  return el('div', { className:'screen pb-nav fade-in' },
    el('div', { style: { background:'linear-gradient(145deg,#1E2D27,#2A4038)', padding:'calc(var(--safe-top)+12px) 24px 28px', borderRadius:'0 0 32px 32px' } },
      el('h1', { style: { color:'white', fontFamily:'Georgia,serif', fontSize:28, margin:'0 0 4px' } }, 'Medications'),
      el('p', { style: { color:'#A8C0B5', margin:'0 0 12px', fontSize:14 } }, takenToday+'/'+totalDoses+' doses taken today'),
      totalDoses > 0 && el('div', { style: { height:6, background:'rgba(255,255,255,0.15)', borderRadius:3 } },
        el('div', { style: { height:'100%', background:'#3EC99A', borderRadius:3, width:((takenToday/totalDoses)*100)+'%', transition:'width 0.4s' } })
      )
    ),
    el('div', { style: { padding:'24px 24px 0' } },
      ...meds.map(med => el('div', { key:med.id, className:'card', style: { marginBottom:14, borderLeft:'4px solid '+med.color } },
        el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 } },
          el('div', null,
            el('p', { style: { fontWeight:700, color:'#1E2D27', margin:'0 0 2px', fontSize:16 } }, med.name),
            el('p', { style: { color:'#A8C0B5', margin:0, fontSize:13 } }, med.dose)
          ),
          el('button', { onClick:()=>setMeds(p=>p.filter(m=>m.id!==med.id)), style: { background:'none', border:'none', color:'#A8C0B5', fontSize:22, cursor:'pointer' } }, '×')
        ),
        ...med.times.map(time => {
          const key = today+'-'+time, taken = med.taken[key];
          return el('div', { key:time, style: { display:'flex', alignItems:'center', justifyContent:'space-between',
            padding:'10px 14px', borderRadius:12, background:taken?med.color+'18':'#F8FAF9',
            border:'1.5px solid '+(taken?med.color:'#E0EDE8'), marginBottom:8 } },
            el('div', { style: { display:'flex', alignItems:'center', gap:10 } },
              el('span', { style: { fontSize:18 } }, taken?'✅':'⏰'),
              el('span', { style: { fontWeight:600, color:'#1E2D27', fontSize:14 } }, time)
            ),
            el('button', { onClick:()=>toggle(med.id,time), style: { padding:'8px 14px', borderRadius:12, border:'1.5px solid '+med.color,
              background:taken?med.color:'white', color:taken?'white':med.color, fontWeight:700, fontSize:13, cursor:'pointer' } },
              taken?'Taken':'Mark Taken')
          );
        })
      )),
      showAdd ? el('div', { className:'card', style: { marginBottom:16 } },
        el('p', { style: { fontWeight:700, color:'#1E2D27', margin:'0 0 14px', fontSize:16 } }, 'Add Medication'),
        el('input', { placeholder:'Medication name', value:newName, onChange:e=>setNewName(e.target.value),
          style: { width:'100%', padding:'12px 14px', borderRadius:12, border:'2px solid #E0EDE8', fontSize:15, outline:'none', background:'#F8F7F3', marginBottom:10, display:'block' } }),
        el('input', { placeholder:'Dose (e.g. 200mg)', value:newDose, onChange:e=>setNewDose(e.target.value),
          style: { width:'100%', padding:'12px 14px', borderRadius:12, border:'2px solid #E0EDE8', fontSize:15, outline:'none', background:'#F8F7F3', marginBottom:10, display:'block' } }),
        el('input', { type:'time', value:newTime, onChange:e=>setNewTime(e.target.value),
          style: { width:'100%', padding:'12px 14px', borderRadius:12, border:'2px solid #E0EDE8', fontSize:15, outline:'none', background:'#F8F7F3', marginBottom:14, display:'block' } }),
        el('div', { style: { display:'flex', gap:10 } },
          el('button', { onClick:()=>setShowAdd(false), style: { flex:1, padding:'12px', borderRadius:12, border:'2px solid #E0EDE8', background:'transparent', color:'#A8C0B5', fontWeight:700, cursor:'pointer' } }, 'Cancel'),
          el('button', { onClick:addMed, style: { flex:2, padding:'12px', borderRadius:12, border:'none', background:'#3EC99A', color:'white', fontWeight:700, cursor:'pointer' } }, 'Add Medication')
        )
      ) : el('button', { onClick:()=>setShowAdd(true),
        style: { width:'100%', padding:'16px', borderRadius:18, border:'2px dashed #3EC99A', background:'transparent', color:'#3EC99A', fontWeight:700, fontSize:16, cursor:'pointer', marginBottom:16 } },
        '+ Add Medication'),
      el('div', { style: { background:'#FFF1EC', borderRadius:14, padding:'14px 18px' } },
        el('p', { style: { color:'#FF7B54', fontSize:13, margin:0, lineHeight:1.6, fontWeight:600 } }, 'Always follow your doctor\'s prescription. This is a reminder tool only.')
      )
    )
  );
}

// ── Install Banner ────────────────────────────────────────────────────────────
function InstallBanner() {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone;
    const dismissed = localStorage.getItem('rw-install-dismissed');
    if (isIOS && !isStandalone && !dismissed) setTimeout(() => setShow(true), 3000);
  }, []);
  if (!show) return null;
  return React.createElement('div', { className:'install-banner show' },
    React.createElement('button', { onClick:()=>{ setShow(false); localStorage.setItem('rw-install-dismissed','1'); } }, '✕'),
    React.createElement('strong', null, 'Add to Home Screen'),
    React.createElement('br'),
    'Tap the Share button below, then "Add to Home Screen" to install RecoverWell like an app.'
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useStorage('rw-user-v3', null);
  const [tab, setTab] = useState('home');
  const [screen, setScreen] = useState(user ? 'main' : 'onboarding');
  const [workoutEx, setWorkoutEx] = useState([]);
  const [history, setHistory] = useStorage('rw-history', []);
  const el = React.createElement;

  const onComplete = data => { setUser(data); setScreen('main'); };
  const onStartWorkout = exs => { setWorkoutEx(exs); setScreen('workout'); };
  const onWorkoutDone = () => {
    const totalReps = workoutEx.reduce((a,e) => a+e.reps*e.sets, 0);
    setHistory(h => [...h, { date:new Date().toISOString(), exercises:workoutEx.length, totalReps, pain:user.painLevel }]);
    setUser(u => ({ ...u, streak:(u.streak||0)+1 }));
    setScreen('main'); setTab('progress');
  };

  if (screen === 'onboarding') return el(Onboarding, { onComplete });
  if (screen === 'workout') return el(WorkoutScreen, { exercises:workoutEx, onComplete:onWorkoutDone, onBack:()=>setScreen('main') });

  const tabs = [
    { id:'home', icon:'🏠', label:'Home' },
    { id:'plan', icon:'📅', label:'Plan' },
    { id:'coach', icon:'🌿', label:'Coach' },
    { id:'progress', icon:'📈', label:'Progress' },
    { id:'meds', icon:'💊', label:'Meds' },
  ];

  return el('div', null,
    tab==='home' && el(HomeScreen, { user, onStartWorkout }),
    tab==='plan' && el(PlanScreen, { user }),
    tab==='progress' && el(ProgressScreen, { user, history }),
    tab==='meds' && el(MedsScreen),
    el('div', { className:'tab-bar' },
      ...tabs.map(t => el('button', { key:t.id, className:'tab-btn '+(tab===t.id?'active':''), onClick:()=>setTab(t.id) },
        el('span', null, t.icon),
        el('span', null, t.label)
      ))
    ),
    tab==='coach' && el(CoachScreen, { user }),
    el(InstallBanner)
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
</body>
</html>
